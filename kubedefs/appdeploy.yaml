apiVersion: apps/v1
kind: Deployment

metadata:
  name: vproapp
  labels:
    app: vproapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vproapp

  template:
    metadata:
      labels:
        app: vproapp

    spec:

      initContainers:

        - name: init-mydb
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nslookup vprodb.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for mydb; sleep 2; done;"
            ]

        - name: init-memcache
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nslookup vprocache01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for memcache; sleep 2; done;"
            ]

      containers:

        - name: vproapp

          image: tcollins520/vprofileapp:latest

          imagePullPolicy: Always

          ports:
            - name: vproapp-port
              containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"
